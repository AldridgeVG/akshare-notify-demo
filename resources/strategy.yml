# ===================== 决策策略配置 =====================
# 以下参数影响信号检测与评分逻辑，修改前请理解各阈值含义。

# 成交量策略
volume:
  ratio_threshold: 1.20   # 量比 > 1.2 视为显著放量（ETF 波动率低，1.5 过滤过严）
  ratio_shrink: 0.50      # 量比 < 0.5 视为显著缩量（更严格定义，减少误判）

# MACD 柱体策略
macd_bar:
  significant_ratio: 1.50   # 当前柱体较近期同色系均值放大 50% 视为显著（降低假信号）
  recent_n: 8               # 近期参考柱体数量（提高判断稳定性）

# 背离检测策略
divergence:
  lookback: 60              # 背离检测回溯天数（覆盖中线级别背离）
  peak_min_distance: 3      # 高低点最小距离（减少 V 型反转漏检）

# 综合评分阈值
score:
  strong_buy: 5             # 强烈买入评分阈值（提高门槛，减少假强烈信号）
  buy: 3                    # 买入评分阈值
  sell: -3                  # 卖出评分阈值
  strong_sell: -5           # 强烈卖出评分阈值（对称提高门槛）
