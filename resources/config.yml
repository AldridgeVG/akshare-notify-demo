# ===================== 核心运行配置 =====================

# 监控标的（主要行业 ETF）
stock:
  codes:
    - "510500"   # 中证500ETF
    - "512880"   # 证券ETF
    - "512050"   # A500ETF
    - "588000"   # 科创50ETF
    - "159949"   # 创业板50ETF
    - "512480"   # 半导体ETF
    - "512800"   # 银行ETF
    - "515790"   # 光伏ETF
    - "515700"   # 新能车ETF
    - "515220"   # 煤炭ETF
    - "512400"   # 有色金属ETF

# 监控行为
monitor:
  schedule_times:
    - "08:00"
    - "20:00"
  history_days: 120   # 历史日K线获取天数
  period: "daily"     # 数据周期: daily（固定日线）

# 技术指标参数
indicators:
  macd:
    fast: 12          # DIF 快线周期
    slow: 26          # DIF 慢线周期
    signal: 9         # DEA 平滑周期
  kdj:
    n: 9              # RSV 计算周期
    m1: 3             # K 平滑系数
    m2: 3             # D 平滑系数
  volume:
    ma_days: 20       # 成交量均线周期
